<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay Sreekumar - Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-img-top {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card {
            min-height: 450px;
        }
        .collapsible {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            padding: 10px;
            text-align: left;
            border: none;
            outline: none;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            border-radius: 5px;
        }
        .collapsible:after {
            content: '\25BC';
            float: right;
        }
        .active:after {
            content: '\25B2';
        }
        .content {
            display: none;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Ajay Sreekumar</a>
        </div>
    </nav>
    
    <header class="bg-primary text-white text-center py-5">
        <h1>Welcome to My Portfolio</h1>
        <p>Data Science | Analysis | Engineering</p>
    </header>
    
    <section id="projects" class="container my-5">
        <h2>Projects</h2>
        
        <button class="collapsible">Data Science & Machine Learning Projects</button>
        <div class="content">
            <div class="row">
                <!-- Add your Data Science & Machine Learning projects here -->
            </div>
        </div>
        
        <button class="collapsible">Data Analytics & Visualization Projects</button>
        <div class="content">
            <div class="row">
                <!-- Add your Data Analytics & Visualization projects here -->
            </div>
        </div>
        
        <button class="collapsible">Data Engineering Projects</button>
        <div class="content">
            <div class="row">
                <!-- Add your Data Engineering projects here -->
            </div>
        </div>
    </section>
    
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 Ajay Sreekumar. All rights reserved.</p>
    </footer>
    
    <script>
        document.querySelectorAll(".collapsible").forEach(button => {
            button.addEventListener("click", function () {
                this.classList.toggle("active");
                let content = this.nextElementSibling;
                content.style.display = content.style.display === "block" ? "none" : "block";
            });
        });
    </script>
</body>
</html>
